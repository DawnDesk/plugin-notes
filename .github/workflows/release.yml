name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PLUGIN_ID: notes
  SIDECAR_NAME: notes-sidecar

jobs:
  package:
    name: Package ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: .exe
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            sidecar_ext: ''
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            sidecar_ext: ''
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sidecar_ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build sidecar
        run: cargo build --release --target ${{ matrix.platform.target }} --manifest-path src-tauri/Cargo.toml

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="package/${PLUGIN_ID}"
          mkdir -p "${package_dir}"
          cp -R dist/. "${package_dir}/"
          cp plugin.manifest.json icon.svg "${package_dir}/"
          cp "src-tauri/target/${{ matrix.platform.target }}/release/${SIDECAR_NAME}${{ matrix.platform.sidecar_ext }}" "${package_dir}/${SIDECAR_NAME}${{ matrix.platform.sidecar_ext }}"

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          artifact="${PLUGIN_ID}-${{ matrix.platform.name }}.dawndesk-plugin"
          cd package/${PLUGIN_ID}
          if command -v zip >/dev/null 2>&1; then
            zip -r "../../${artifact}" .
          else
            7z a "../../${artifact}" .
          fi
          cd ../..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${artifact}" > "${artifact}.sha256"
          else
            shasum -a 256 "${artifact}" > "${artifact}.sha256"
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dawndesk-plugin
            *.sha256
